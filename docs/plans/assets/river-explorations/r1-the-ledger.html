        btn.textContent = dark ? '☀' : '☾';
        localStorage.setItem('river-dark', dark ? '1' : '0');
      }
      btn.addEventListener('click', toggle);
      if (localStorage.getItem('river-dark') === '1') {
        root.classList.add('dark');
        btn.textContent = '☀';
      }
    })();
    </script>
    
</body>
</html>
