name: AI News Ranking

"on":
  schedule:
    # 4x daily refresh for Home Spotlight + AI sidebar
    # IST: 5:30, 11:30, 17:30, 23:30
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Validate secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          [ -n "$GEMINI_API_KEY" ] || (echo "::error::GEMINI_API_KEY not set" && exit 1)

      - name: Run AI ranker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 ai_ranker.py

      - name: Run WSW Ranker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 wsw_ranker.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add static/ai_rankings.json static/wsw_clusters.json
            git commit -m "Update AI rankings + WSW clusters - $(date +'%Y-%m-%d')"
            git pull --no-rebase origin main
            git push
          fi
