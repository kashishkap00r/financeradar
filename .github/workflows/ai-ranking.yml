name: AI News Ranking

"on":
  schedule:
    # 2x daily refresh for Home Spotlight + AI sidebar.
    # Target completion: 6:00 AM IST (00:30 UTC) and 6:00 PM IST (12:30 UTC).
    # Offset ~2.5 hrs earlier to absorb GitHub Actions cron delay.
    - cron: "0 10 * * *"   # fires 10:00 UTC → ready ~6:00 PM IST
    - cron: "0 22 * * *"   # fires 22:00 UTC → ready ~6:00 AM IST next day
  workflow_dispatch:

concurrency:
  group: financeradar-ai-ranking
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Validate secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          [ -n "$GEMINI_API_KEY" ] || (echo "::error::GEMINI_API_KEY not set" && exit 1)

      - name: Run AI ranker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 ai_ranker.py

      - name: Run WSW Ranker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 wsw_ranker.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add static/ai_rankings.json static/wsw_clusters.json
            git commit -m "Update AI rankings + WSW clusters - $(date +'%Y-%m-%d')"
            git pull --no-rebase origin main
            git push
          fi
