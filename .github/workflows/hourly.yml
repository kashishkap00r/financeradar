name: Update FinanceRadar

"on":
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          [ -n "$TELEGRAM_API_ID" ] || (echo "::error::TELEGRAM_API_ID not set" && exit 1)
          [ -n "$TELEGRAM_API_HASH" ] || (echo "::error::TELEGRAM_API_HASH not set" && exit 1)
          [ -n "$TELEGRAM_SESSION" ] || (echo "::error::TELEGRAM_SESSION not set" && exit 1)

      - name: Fetch Telegram reports
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python3 telegram_fetcher.py

      - name: Run aggregator
        run: python3 aggregator.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html static/articles.json static/telegram_reports.json static/youtube_cache.json static/reports_cache.json static/published_snapshot.json
            git commit -m "Update news feeds"
            git pull --no-rebase origin main
            git push
          fi
